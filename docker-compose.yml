services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kirmaphore
      POSTGRES_USER: kirmaphore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kirmaphore"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: kirmaphore-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://kirmaphore:${POSTGRES_PASSWORD}@postgres:5432/kirmaphore?sslmode=disable
      MASTER_KEY: ${MASTER_KEY}
      RP_ORIGIN: https://kirmaphore.kirvps.work:8443
      RP_ID: kirmaphore.kirvps.work
      RP_NAME: Kirmaphore
      ALLOWED_ORIGIN: https://kirmaphore.kirvps.work:8443
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - sandbox-net

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: https://kirmaphore.kirvps.work:8443
    container_name: kirmaphore-web
    restart: unless-stopped
    networks:
      - sandbox-net

volumes:
  postgres_data:

networks:
  internal:
  sandbox-net:
    external: true
    name: agent-sandbox-api_sandbox-net
